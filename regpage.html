<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        body {
            background-color:rgb(14, 32, 59);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .container {
            background: rgba(16, 45, 88, 0.9);
            color: goldenrod;
            padding: 25px;
            border-radius: 12px;
            width: 340px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h2 {
            margin-bottom: 15px;
        }
        input {
            width: 75%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 5px;
            background: rgb(188, 184, 201);
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: goldenrod;
            color: rgb(16, 45, 88);
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button a {
            text-decoration: none;
            color: rgb(16, 45, 88);
            
        }
        button:hover {
            background: darkgoldenrod;
        }
    </style>
</head>
<body>
    <form action="regpage.html" method="POST" >
        <div class="container">
            <h2>Create an Account</h2>
            <form>
                <input type="text" placeholder="Username" required>
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <button type="submit"><a href="logpage.html">Sign Up</a></button>
            </form>
        </div>
    </form>
</body>
</html>
